{% extends "base.html" %}
{% block title %}register{% endblock %}

{% block content %}

{% if errors %}
<ul>
    {% for error in errors %}
    <li>{{error}}</li>
    {% endfor %}
</ul>
{% endif %}

<form id="formulaire_register" action="{{url_for('new_user')}}" method="POST">

    <label for="first_name">Prénom</label>
    <input type="text" id="first_name" name="first_name">
    <span class="error" id="err_first_name"></span>

    <label for="last_name">Nom famille</label>
    <input type="text" id="last_name" name="last_name">
    <span id="err_last_name"></span>

    <label for="email">Courriel</label>
    <input type="email" id="email" name="email">
    <span class="error" id="err_email"></span>

    <label for="username">Nom utilisateur</label>
    <input type="text" id="username" name="username">
    <span class="error" id="err_username"></span>

    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password">
    <span class="error" id="err_password"></span>

    <button type="submit">S'enregistrer</button>
</form>

<script src="{{url_for('static', filename='js/script_register.js')}}"></script>

{% endblock %}
