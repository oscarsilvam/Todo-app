{% extends "base.html" %}
{% block title %}Connexion{% endblock %}

{% block content%}

<div class="content p-4 mx-auto">
    <h1 class="mb-4 text-center">Se connecter</h1>
    {% include "partials/_error_form.html" %}

    <form action="{{url_for('connection')}}" method="POST">

        <div class="col-12 mb-2">
            <label for="username">Nom utilisateur</label>
            <input type="text" id="username" class="form-control" name="username">
        </div>

        <div class="col-12 mb-2">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" class="form-control" name="password">
        </div>

        <div class="d-flex justify-content-center">
        <button type="submit" class="btn btn-outline-primary mt-3">Connexion</button>
        </div>
    </form>
</div>
{% endblock %}
